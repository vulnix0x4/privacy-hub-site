name: verify + build

# Runs all Phase-12 verification gates on every push to `main` and on
# pull requests. Each gate maps to a section of the launch readiness
# checklist in docs/plans/2026-04-17-privacy-hub-design.md §12.
#
# Gates:
#   - astro check + vitest  (existing unit + integration — 183 tests)
#   - build                 (produces dist/client + dist/server)
#   - build-artifacts       (Gate 5 — vitest assertions over dist/**)
#   - no-third-party        (Gate 1 — Playwright; zero cross-origin requests)
#   - scan-endpoints        (Gate 4 — Astro server smoke — runs with vitest,
#                            rolled into `npm test` after the build)
#   - a11y                  (Gate 2 — pa11y-ci, WCAG 2.2 AA, zero warnings)
#   - lighthouse            (Gate 3 — REPORT-ONLY, not blocking)
#
# Lighthouse is environment-sensitive; we capture numbers as an artifact
# but never fail the job on them.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # Pin a port so Playwright webServer + pa11y + Lighthouse all share
      # the same running preview.
      ASTRO_HOST: 127.0.0.1
      ASTRO_PORT: '4329'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ---- unit + build ---------------------------------------------------
      - name: Astro type-check
        run: npm run astro -- check

      - name: Vitest (unit + integration)
        run: npm test

      - name: Build
        run: npm run build

      - name: Re-run vitest against built dist (Gate 4 + Gate 5)
        run: npm test
        # tests/build-artifacts.test.ts and tests/e2e/scan-endpoints.test.ts
        # both skip when dist/client|server is absent; running vitest again
        # after `npm run build` actually exercises them.

      # ---- Gate 1: no third-party requests --------------------------------
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright OS deps (if cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Playwright — Gate 1 no-third-party + /api/scan probe
        run: npm run test:e2e

      # ---- Gate 2: pa11y-ci -----------------------------------------------
      - name: Start Astro preview server for a11y + lighthouse
        run: |
          HOST=${{ env.ASTRO_HOST }} PORT=${{ env.ASTRO_PORT }} \
            node dist/server/entry.mjs &
          echo "ASTRO_PID=$!" >> $GITHUB_ENV
          # wait for server to come up
          for i in $(seq 1 40); do
            if curl -sS -o /dev/null http://${{ env.ASTRO_HOST }}:${{ env.ASTRO_PORT }}/en/; then
              echo "server ready"
              exit 0
            fi
            sleep 0.25
          done
          echo "server never came up" >&2
          exit 1

      - name: pa11y-ci — Gate 2 WCAG 2.2 AA
        run: PA11Y_PORT=${{ env.ASTRO_PORT }} npm run test:a11y

      # ---- Gate 3: Lighthouse (report-only) -------------------------------
      - name: Lighthouse spot-check — Gate 3 (report-only)
        # continue-on-error: true is explicit — Lighthouse can be flaky on
        # hosted runners due to CPU variance. Numbers below are capture,
        # not gate.
        continue-on-error: true
        run: LH_SKIP_SERVER=1 LH_PORT=${{ env.ASTRO_PORT }} npm run audit:lighthouse

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: lighthouse-reports/
          if-no-files-found: ignore

      - name: Stop preview server
        if: always() && env.ASTRO_PID != ''
        run: kill $ASTRO_PID || true

      # ---- Upload Playwright report on failure ---------------------------
      - name: Upload Playwright report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
