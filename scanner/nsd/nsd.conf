# NSD configuration for scanner-nsd.
#
# Authoritative-only for *.scan.privacy.whattheflip.lol. Per design doc §13.1
# non-negotiable #5: NSD has no query-log subsystem. That's precisely why it
# was chosen over Knot. We pointedly do NOT enable logfile / log-time-ascii /
# verbosity>=2 — anything that would persist or surface the queries we serve.
#
# Query telemetry (resolver-IP observation for DNS-leak detection) happens at
# the scanner-nonce sidecar by inspecting zone reloads, NOT by reading NSD
# query logs. See scanner/nonce/main.go.
#
# TODO(phase-3.5): to actually record the resolver IP that hit NSD for a
# given nonce (so the DNS-leak probe can render a verdict instead of
# "pending"), add a dnstap output to this config and a dnstap reader to
# the sidecar. dnstap is a binary query stream over UNIX socket — no disk
# writes, no log file — which keeps §13.1 non-negotiable #5 intact. Until
# that lands, resolverIp stays NULL in the nonceStore and the probe
# reports pending. Example config for the future:
#
#   dnstap:
#       dnstap-enable: yes
#       dnstap-socket-path: "/var/run/nsd/dnstap.sock"
#       dnstap-send-identity: no
#       dnstap-send-version: no
#       dnstap-log-client-query-messages: yes
#
# Zone file is rewritten on-demand by scanner-nonce and a reload is triggered
# via nsd-control. Remote-control is over a UNIX socket in /var/run/nsd so we
# never expose it on the network.

server:
    # Bind broadly — the Docker bridge netns gives us isolation already.
    ip-address: 0.0.0.0
    port: 53
    # Silence. The default (1) still emits startup and zone-transfer lines;
    # verbosity: 0 keeps only fatal errors on stderr, which Docker captures.
    verbosity: 0
    # Drop privileges after bind. The `nsd` user is created by the apk package.
    username: nsd
    # No PID file — we kill the container, we don't reload by PID.
    pidfile: ""
    # No zonestats — that would be query telemetry.
    zonesdir: "/etc/nsd/zones"
    # Never write a database — zones are re-read on start.
    database: ""
    # Disable any diagnostic logging to disk.
    logfile: ""
    # Don't track query stats — nothing to leak later.
    hide-version: yes
    hide-identity: yes

remote-control:
    control-enable: yes
    control-interface: /var/run/nsd/nsd.sock
    # UNIX-socket control; no TLS/keys required because no TCP listener.

zone:
    name: "scan.privacy.whattheflip.lol"
    zonefile: "scan.zone"
