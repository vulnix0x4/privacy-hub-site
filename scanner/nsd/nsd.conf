# NSD configuration for scanner-nsd.
#
# Authoritative-only for *.scan.privacy.whattheflip.lol. Per design doc §13.1
# non-negotiable #5: NSD has no query-log subsystem. That's precisely why it
# was chosen over Knot. We pointedly do NOT enable logfile / log-time-ascii /
# verbosity>=2 — anything that would persist or surface the queries we serve.
#
# Query telemetry for the DNS-leak probe (resolver-IP observation) is handled
# by dnstap: a binary Frame Streams protocol over a Unix socket, consumed
# in-memory by the scanner-nonce sidecar. No disk writes, no log file — §13.1
# non-negotiable #5 stays intact. See scanner/nonce/main.go for the consumer.

server:
    # Bind broadly — the Docker bridge netns gives us isolation already.
    ip-address: 0.0.0.0
    port: 53
    # Silence. The default (1) still emits startup and zone-transfer lines;
    # verbosity: 0 keeps only fatal errors on stderr, which Docker captures.
    verbosity: 0
    # Drop privileges after bind. The `nsd` user is created by the Dockerfile.
    username: nsd
    # No PID file — we kill the container, we don't reload by PID.
    pidfile: ""
    # No zonestats — that would be query telemetry.
    zonesdir: "/etc/nsd/zones"
    # Never write a database — zones are re-read on start.
    database: ""
    # Disable any diagnostic logging to disk.
    logfile: ""
    # Don't track query stats — nothing to leak later.
    hide-version: yes
    hide-identity: yes

remote-control:
    control-enable: yes
    control-interface: /var/run/nsd/nsd.sock
    # UNIX-socket control; no TLS/keys required because no TCP listener.

# dnstap: stream of incoming queries / outgoing responses over a Unix
# socket. The sidecar reads AUTH_QUERY frames, extracts the QNAME and the
# resolver's egress IP, and POSTs to /api/scan/record-resolver. Nothing
# hits disk: Frame Streams is a wire protocol, not a file format.
#
# dnstap-send-identity/version stay off so the frames never include our
# host string. We log only auth-query-messages (not responses) because the
# response is deterministic from the zone file and adds no signal.
dnstap:
    dnstap-enable: yes
    dnstap-socket-path: "/var/run/nsd/dnstap.sock"
    dnstap-send-identity: no
    dnstap-send-version: no
    dnstap-log-auth-query-messages: yes
    dnstap-log-auth-response-messages: no

zone:
    name: "scan.privacy.whattheflip.lol"
    zonefile: "scan.zone"
